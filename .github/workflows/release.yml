name: Python package build and publish with uv

on:
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest
    # Pure-Python package (py3-none-any wheel, no compiled extensions) — a
    # single build produces the one wheel + sdist that serve every Python
    # version, so there is no need to matrix over interpreters here.
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Build sdist and wheel
        run: uv build

      # Guard: the version that gets published comes entirely from
      # src/navigator_eventbus/version.py (via [tool.hatch.version]), NOT from
      # the git tag. Fail fast if a release tag was cut without bumping
      # version.py, instead of silently building/publishing the wrong version.
      - name: Verify release tag matches built version
        if: github.event_name == 'release'
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          BUILT="$(basename "$(ls dist/*.whl)" | cut -d- -f2)"
          echo "Release tag: ${TAG}   Built version: ${BUILT}"
          if [ "$TAG" != "$BUILT" ]; then
            echo "::error::Release tag ('${TAG}') != built version ('${BUILT}'). Bump src/navigator_eventbus/version.py to match the tag before releasing."
            exit 1
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    environment:
      name: pypi
      url: https://pypi.org/p/navigator-eventbus
    permissions:
      id-token: write
    steps:
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: List files in dist
        run: ls -l dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
